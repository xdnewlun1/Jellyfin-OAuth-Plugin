name: Publish Release

on:
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v4.1.0.0)"
        required: true
        type: string

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      dotnet-version: "9.0.*"
      dotnet-target: "net9.0"

  upload:
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Prepare GitHub Release assets
        run: |-
          for file in ./*; do
            md5sum ${file#./} >> ${file%.*}.md5
            sha256sum ${file#./} >> ${file%.*}.sha256
          done
          ls -l

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          fail_on_unmatched_files: true
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: ./*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-manifest:
    runs-on: ubuntu-latest
    needs:
      - upload
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: _dist

      - name: Generate and publish manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          pip install --quiet jprm

          # Clone the manifest branch, or create it fresh
          if git clone --branch manifest-release "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" _manifest 2>/dev/null; then
            if [ ! -f _manifest/manifest.json ]; then
              jprm repo init _manifest
            fi
          else
            mkdir _manifest
            jprm repo init _manifest
            cd _manifest && git init
            git checkout --orphan manifest-release
            git add manifest.json
            git -c user.name="github-actions" -c user.email="actions@github.com" commit -m "init manifest"
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            git push -u origin manifest-release
            cd ..
          fi

          # Add the plugin zip to the manifest
          for zip in _dist/*.zip; do
            jprm repo add --url "https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}" _manifest "$zip"
          done

          # jprm inserts a plugin-name subdirectory in sourceUrl that doesn't exist
          # in GitHub release asset URLs. Strip it out: .../tag/subdir/file.zip -> .../tag/file.zip
          python3 -c "
          import json, re
          with open('_manifest/manifest.json', 'r') as f:
              data = json.load(f)
          for plugin in data:
              for ver in plugin.get('versions', []):
                  url = ver.get('sourceUrl', '')
                  ver['sourceUrl'] = re.sub(r'(releases/download/[^/]+)/[^/]+/([^/]+\.zip)$', r'\1/\2', url)
          with open('_manifest/manifest.json', 'w') as f:
              json.dump(data, f, indent=4)
          "

          # Push updated manifest
          cd _manifest
          git add manifest.json
          git -c user.name="github-actions" -c user.email="actions@github.com" commit -m "Update manifest (${RELEASE_TAG})" || echo "No manifest changes"
          git push origin manifest-release
