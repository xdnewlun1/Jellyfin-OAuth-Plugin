name: Publish Release

on:
  release:
    types:
      - released
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v4.1.0.0)"
        required: true
        type: string

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      dotnet-version: "9.0.*"
      dotnet-target: "net9.0"

  upload:
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Prepare GitHub Release assets
        run: |-
          for file in ./*; do
            md5sum ${file#./} >> ${file%.*}.md5
            sha256sum ${file#./} >> ${file%.*}.sha256
          done
          ls -l

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          fail_on_unmatched_files: true
          tag_name: ${{ github.event.release.tag_name || inputs.tag }}
          files: ./*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-manifest:
    runs-on: ubuntu-latest
    needs:
      - upload
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: _dist

      - name: Generate and publish manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          pip install --quiet jprm

          # Clone or init the manifest branch
          git clone --branch manifest-release "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" _manifest 2>/dev/null || {
            mkdir _manifest && cd _manifest && git init
            git checkout --orphan manifest-release
            echo '[]' > manifest.json
            git add manifest.json
            git -c user.name="github-actions" -c user.email="actions@github.com" commit -m "init manifest"
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            git push -u origin manifest-release
            cd ..
          }

          # Use JPRM to add/update the plugin in the manifest from the built zip
          for zip in _dist/*.zip; do
            jprm repo add --url "https://github.com/${{ github.repository }}/releases/download/${RELEASE_TAG}/$(basename "$zip")" _manifest "$zip"
          done

          # Push updated manifest
          cd _manifest
          git add manifest.json
          git -c user.name="github-actions" -c user.email="actions@github.com" commit -m "Update manifest (${RELEASE_TAG})" || echo "No manifest changes"
          git push origin manifest-release
